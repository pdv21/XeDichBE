version: '3.8'

services:
  # ========================
  # MySQL Database
  # ========================
  mysql:
    image: mysql:8.0
    container_name: xedich_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: xedich_db
      MYSQL_USER: xedich_user
      MYSQL_PASSWORD: xedich_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql        # lưu data không mất khi restart
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql  # chạy SQL khi khởi tạo lần đầu
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ========================
  # Redis Cache
  # ========================
  redis:
    image: redis:7-alpine
    container_name: xedich_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ========================
  # phpMyAdmin (quản lý DB qua trình duyệt)
  # ========================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: xedich_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data: